appId: com.gitclaw.app
productName: GitClaw
directories:
  buildResources: resources
  output: release
files:
  - dist
  - dist-electron
mac:
  target:
    - dmg
    - zip
  icon: resources/icon.png
  category: public.app-category.developer-tools
win:
  target: nsis
  icon: resources/icon.png
linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
