name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search [existing issues](https://github.com/Abhivera/gitclaw/issues) first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start GitClaw with ...
        2. Open a PR on ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Git provider
      options:
        - GitHub
        - GitLab
        - Bitbucket
        - Not provider-specific
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: GitClaw version or commit
      placeholder: e.g. v0.1.0 or abc1234

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redact secrets, tokens, and private repo names.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have redacted secrets and credentials from this report
          required: true
