name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: ci-placeholder-secret
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gitclaw
      GITHUB_CLIENT_ID: ci-placeholder
      GITHUB_CLIENT_SECRET: ci-placeholder
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gitclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gitclaw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
